<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자아존중감 테스트</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 추가적인 커스텀 애니메이션 등이 필요할 경우 여기에 작성합니다 */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg overflow-hidden transition-all duration-300">
        
        <!-- ==================== 1. 시작 화면 ==================== -->
        <div id="step-intro" class="p-8 md:p-12 text-center fade-in">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="clipboard-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4 text-slate-900">자아존중감 테스트</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">
                본 테스트는 심리학 분야에서 가장 널리 사용되는 <strong>로젠버그 자아존중감 척도(RSES)</strong>를 기반으로 합니다.<br/><br/>
                총 10문항으로 구성되어 있으며, 각 문항을 읽고 평소 자신의 생각과 가장 일치하는 항목을 선택해 주세요. 직관적으로 떠오르는 답변을 고르는 것이 가장 정확합니다.
            </p>
            <button onclick="startTest()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-full shadow-md transition-all flex items-center justify-center mx-auto gap-2">
                테스트 시작하기 <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- ==================== 2. 검사 화면 ==================== -->
        <div id="step-test" class="p-8 md:p-12 hidden fade-in">
            <div class="mb-8">
                <div class="flex justify-between text-sm text-slate-500 mb-2 font-medium">
                    <span>진행 상황</span>
                    <span id="progress-text">1 / 10</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300 ease-out" style="width: 10%"></div>
                </div>
            </div>

            <div class="min-h-[200px] flex flex-col justify-center mb-8">
                <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 text-center leading-tight">
                    Q1. 질문 내용
                </h2>
                
                <div id="options-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- 옵션 버튼들이 동적으로 생성됩니다 -->
                </div>
            </div>

            <div class="flex justify-between items-center mt-8 pt-6 border-t border-slate-100">
                <button id="btn-prev" onclick="handlePrevious()" class="flex items-center gap-1 font-medium text-slate-500 hover:text-indigo-600">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> 이전 문항
                </button>
                
                <div id="btn-next-container">
                    <!-- 다음/결과보기 버튼이 동적으로 생성됩니다 -->
                </div>
            </div>
        </div>

        <!-- ==================== 3. 결과 화면 ==================== -->
        <div id="step-result" class="p-8 md:p-12 hidden fade-in">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-slate-900 mb-2">테스트 결과</h2>
                <p class="text-slate-500">당신의 자아존중감 점수는 총 30점 만점에</p>
            </div>

            <div class="flex justify-center mb-8">
                <div id="score-circle" class="relative flex items-center justify-center w-40 h-40 rounded-full border-8">
                    <span id="score-number" class="text-5xl font-black">0</span>
                    <span class="absolute bottom-4 text-sm font-medium text-slate-500">점</span>
                </div>
            </div>

            <div id="interpretation-box" class="p-6 rounded-2xl mb-8 text-center">
                <h3 id="interp-level" class="text-xl font-bold mb-3"></h3>
                <p id="interp-desc" class="text-slate-700 leading-relaxed"></p>
            </div>

            <!-- AI 맞춤 분석 섹션 -->
            <div class="mb-8 mt-12 border-t border-slate-100 pt-8">
                <div class="text-center mb-6">
                    <h3 class="text-lg font-bold text-slate-800 mb-2">더 자세한 나의 심리 상태가 궁금하다면?</h3>
                    <p class="text-sm text-slate-500">각 문항의 응답 패턴을 AI가 분석하여 나만의 맞춤 조언을 제공합니다.</p>
                </div>
                <div id="ai-section-container">
                    <!-- AI 버튼 / 로딩 / 결과가 동적으로 렌더링됩니다 -->
                </div>
            </div>

            <!-- DB 저장 상태 알림 -->
            <div id="save-status-container" class="mb-8 flex justify-center">
                <!-- 저장 상태가 동적으로 렌더링됩니다 -->
            </div>

            <div class="flex justify-center mt-8">
                <button onclick="startTest()" class="flex items-center gap-2 text-indigo-600 font-semibold hover:text-indigo-800 transition-colors bg-indigo-50 hover:bg-indigo-100 px-6 py-3 rounded-full">
                    <i data-lucide="refresh-ccw" class="w-5 h-5"></i> 테스트 다시하기
                </button>
            </div>
        </div>

    </div>

    <!-- ==================== 자바스크립트 로직 ==================== -->
    <script>
        // --- 환경 설정 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwc_cObbA036QZpyDaer4sD1LuFK5sePuExwll7skB_hGTuxGQVS5BmrBQjw8dMoeTn/exec";

        const QUESTIONS = [
            { id: 1, text: "나는 내가 다른 사람들과 마찬가지로 가치 있는 사람이라고 생각한다.", isReverse: false },
            { id: 2, text: "나는 좋은 성품을 가졌다고 생각한다.", isReverse: false },
            { id: 3, text: "나는 대체로 실패한 사람이라는 느낌이 든다.", isReverse: true },
            { id: 4, text: "나는 대부분의 사람들과 같이 일을 잘 할 수 있다.", isReverse: false },
            { id: 5, text: "나는 나 자신에 대해 자랑할 만한 것이 별로 없다.", isReverse: true },
            { id: 6, text: "나는 내 자신에 대해 긍정적인 태도를 가지고 있다.", isReverse: false },
            { id: 7, text: "나는 내 자신에 대해 대체로 만족한다.", isReverse: false },
            { id: 8, text: "나는 내 자신을 좀 더 존중할 수 있었으면 좋겠다.", isReverse: true },
            { id: 9, text: "나는 가끔 내 자신이 쓸모없는 사람이라는 느낌이 든다.", isReverse: true },
            { id: 10, text: "나는 때때로 내가 좋지 않은 사람이라고 생각한다.", isReverse: true }
        ];

        const OPTIONS = [
            { label: "매우 그렇지 않다", value: 0 },
            { label: "그렇지 않다", value: 1 },
            { label: "그렇다", value: 2 },
            { label: "매우 그렇다", value: 3 }
        ];

        // --- 상태 관리 변수 (React의 useState 역할) ---
        let step = 'intro'; // 'intro', 'test', 'result'
        let currentQIndex = 0;
        let answers = {};
        let totalScore = null;
        let isSaving = false;
        let saveStatus = null; // 'success', 'error', null
        let aiFeedback = null;
        let isGeneratingAI = false;
        let aiError = null;

        // 초기 아이콘 렌더링
        lucide.createIcons();

        // --- 화면 렌더링 함수 ---
        function updateUI() {
            // 화면 전환
            document.getElementById('step-intro').classList.toggle('hidden', step !== 'intro');
            document.getElementById('step-test').classList.toggle('hidden', step !== 'test');
            document.getElementById('step-result').classList.toggle('hidden', step !== 'result');

            if (step === 'test') {
                renderTestStep();
            } else if (step === 'result') {
                renderResultStep();
            }
            
            // 동적으로 생성된 HTML 내의 아이콘 활성화
            lucide.createIcons();
        }

        function renderTestStep() {
            // 진행 상황
            const progress = ((currentQIndex) / QUESTIONS.length) * 100;
            document.getElementById('progress-text').innerText = `${currentQIndex + 1} / ${QUESTIONS.length}`;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // 질문 내용
            document.getElementById('question-text').innerText = `Q${currentQIndex + 1}. ${QUESTIONS[currentQIndex].text}`;

            // 옵션 버튼 렌더링
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            OPTIONS.forEach(option => {
                const isSelected = answers[currentQIndex] === option.value;
                const btnClass = isSelected 
                    ? 'border-indigo-600 bg-indigo-50 text-indigo-700' 
                    : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50 text-slate-600';
                
                optionsContainer.innerHTML += `
                    <button onclick="handleAnswer(${option.value})" class="py-4 px-6 rounded-xl border-2 text-lg font-medium transition-all ${btnClass}">
                        ${option.label}
                    </button>
                `;
            });

            // 이전 버튼 상태
            const btnPrev = document.getElementById('btn-prev');
            if (currentQIndex === 0) {
                btnPrev.className = 'flex items-center gap-1 font-medium text-slate-300 cursor-not-allowed';
                btnPrev.disabled = true;
            } else {
                btnPrev.className = 'flex items-center gap-1 font-medium text-slate-500 hover:text-indigo-600';
                btnPrev.disabled = false;
            }

            // 다음/결과 버튼 상태
            const btnNextContainer = document.getElementById('btn-next-container');
            if (currentQIndex === QUESTIONS.length - 1) {
                const hasAnswered = answers[currentQIndex] !== undefined;
                if (hasAnswered) {
                    btnNextContainer.innerHTML = `
                        <button onclick="calculateResult()" class="py-2 px-6 rounded-full font-semibold flex items-center gap-2 transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-md">
                            결과 보기 <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    `;
                } else {
                    btnNextContainer.innerHTML = `
                        <button disabled class="py-2 px-6 rounded-full font-semibold flex items-center gap-2 transition-all bg-slate-200 text-slate-400 cursor-not-allowed">
                            결과 보기 <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    `;
                }
            } else {
                if (answers[currentQIndex] !== undefined) {
                    btnNextContainer.innerHTML = `<span class="text-slate-400 text-sm">다음 문항으로 이동 중...</span>`;
                } else {
                    btnNextContainer.innerHTML = `<span class="text-slate-400 text-sm">답변을 선택해 주세요</span>`;
                }
            }
        }

        function renderResultStep() {
            const interpretation = getInterpretation(totalScore);

            // 점수 및 해석 디자인 적용
            const scoreCircle = document.getElementById('score-circle');
            const scoreNumber = document.getElementById('score-number');
            const interpBox = document.getElementById('interpretation-box');
            
            // 기존 색상 클래스 초기화 후 새 색상 적용
            scoreCircle.className = `relative flex items-center justify-center w-40 h-40 rounded-full border-8 ${interpretation.color.replace('text', 'border')} ${interpretation.bg}`;
            scoreNumber.className = `text-5xl font-black ${interpretation.color}`;
            scoreNumber.innerText = totalScore;
            
            interpBox.className = `p-6 rounded-2xl mb-8 text-center ${interpretation.bg}`;
            document.getElementById('interp-level').className = `text-xl font-bold mb-3 ${interpretation.color}`;
            document.getElementById('interp-level').innerText = interpretation.level;
            document.getElementById('interp-desc').innerText = interpretation.desc;

            // AI 섹션 렌더링
            const aiContainer = document.getElementById('ai-section-container');
            if (isGeneratingAI) {
                aiContainer.innerHTML = `
                    <div class="w-full bg-slate-50 rounded-2xl p-8 flex flex-col items-center justify-center text-slate-500 border border-slate-200">
                        <i data-lucide="loader-2" class="animate-spin mb-4 w-8 h-8"></i>
                        <p class="font-medium animate-pulse">상담사가 응답 패턴을 신중하게 분석하고 있습니다...</p>
                    </div>
                `;
            } else if (aiError) {
                aiContainer.innerHTML = `
                    <div class="w-full bg-rose-50 text-rose-600 rounded-2xl p-6 flex flex-col items-center justify-center border border-rose-200 text-center">
                        <i data-lucide="alert-circle" class="w-7 h-7 mb-2"></i>
                        <p class="font-medium">${aiError}</p>
                        <button onclick="generateAIFeedback()" class="mt-4 underline text-sm hover:text-rose-800">다시 시도하기</button>
                    </div>
                `;
            } else if (aiFeedback) {
                aiContainer.innerHTML = `
                    <div class="w-full bg-gradient-to-br from-violet-50 to-fuchsia-50 rounded-2xl p-6 md:p-8 border border-violet-100 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-400 to-fuchsia-400"></div>
                        <h4 class="flex items-center gap-2 text-violet-800 font-bold text-lg mb-4">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> AI 심리 상담사의 따뜻한 조언
                        </h4>
                        <div class="text-slate-700 leading-relaxed whitespace-pre-wrap">${aiFeedback}</div>
                    </div>
                `;
            } else {
                aiContainer.innerHTML = `
                    <button onclick="generateAIFeedback()" class="w-full bg-gradient-to-r from-violet-500 to-fuchsia-500 hover:from-violet-600 hover:to-fuchsia-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        ✨ AI 심리 상담사에게 맞춤 분석 받기 ✨
                    </button>
                `;
            }

            // 저장 상태 알림 렌더링
            const saveContainer = document.getElementById('save-status-container');
            if (isSaving) {
                saveContainer.innerHTML = `
                    <div class="flex items-center gap-2 text-slate-500 text-sm font-medium bg-slate-50 px-4 py-2 rounded-full border border-slate-200">
                        <i data-lucide="refresh-ccw" class="w-4 h-4 animate-spin"></i>
                        <span>결과를 데이터베이스에 저장하는 중...</span>
                    </div>
                `;
            } else if (saveStatus === 'success') {
                saveContainer.innerHTML = `
                    <div class="flex items-center gap-2 text-emerald-600 text-sm font-medium bg-emerald-50 px-4 py-2 rounded-full border border-emerald-200">
                        <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                        <span>연구/통계 데이터베이스에 성공적으로 저장되었습니다.</span>
                    </div>
                `;
            } else if (saveStatus === 'error') {
                saveContainer.innerHTML = `
                    <div class="flex items-center gap-2 text-rose-600 text-sm font-medium bg-rose-50 px-4 py-2 rounded-full border border-rose-200">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i>
                        <span>저장에 실패했습니다. 관리자에게 문의해주세요.</span>
                    </div>
                `;
            } else {
                saveContainer.innerHTML = '';
            }
        }

        // --- 상호작용 로직 ---
        function startTest() {
            step = 'test';
            currentQIndex = 0;
            answers = {};
            totalScore = null;
            saveStatus = null;
            aiFeedback = null;
            aiError = null;
            updateUI();
        }

        function handleAnswer(value) {
            answers[currentQIndex] = value;
            updateUI(); // 선택한 버튼 시각적 피드백
            
            // 자동으로 다음 문항으로 넘어가기 (약간의 딜레이 후)
            if (currentQIndex < QUESTIONS.length - 1) {
                setTimeout(() => {
                    currentQIndex++;
                    updateUI();
                }, 300);
            }
        }

        function handlePrevious() {
            if (currentQIndex > 0) {
                currentQIndex--;
                updateUI();
            }
        }

        async function calculateResult() {
            let score = 0;
            QUESTIONS.forEach((q, index) => {
                const answerValue = answers[index];
                if (q.isReverse) {
                    score += (3 - answerValue); // 역문항 점수 변환
                } else {
                    score += answerValue;
                }
            });
            
            totalScore = score;
            step = 'result';
            updateUI();
            
            // 구글 스프레드시트(GAS)에 결과 저장
            await saveResultToDB(score, answers);
        }

        async function saveResultToDB(score, finalAnswers) {
            isSaving = true;
            updateUI();

            try {
                const payload = {
                    action: 'save',
                    timestamp: new Date().toLocaleString(),
                    score: score,
                    answers: finalAnswers
                };
                
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                saveStatus = 'success';
            } catch (error) {
                console.error("데이터 저장 실패:", error);
                saveStatus = 'error';
            } finally {
                isSaving = false;
                updateUI();
            }
        }

        // --- API Retry 로직 구현 (지수 백오프) ---
        async function fetchWithRetry(url, options) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            let lastError;
            
            for (let i = 0; i < delays.length + 1; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    lastError = error;
                    if (i < delays.length) {
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }
            throw lastError;
        }

        // --- Gemini API 연동 로직 (GAS 프록시 사용) ---
        async function generateAIFeedback() {
            isGeneratingAI = true;
            aiError = null;
            aiFeedback = null;
            updateUI();
            
            try {
                // 사용자의 응답 내용을 텍스트로 변환
                const answerDetails = QUESTIONS.map((q, i) => {
                    const selectedOption = OPTIONS.find(o => o.value === answers[i])?.label;
                    return `문항 ${q.id}: "${q.text}"\n답변: ${selectedOption}`;
                }).join('\n\n');

                // GAS로 보낼 페이로드 구성 (동작 구분을 위해 action 추가)
                const payload = {
                    action: 'generateAI',
                    totalScore: totalScore,
                    answerDetails: answerDetails
                };

                // 프론트엔드에서 API 키 없이 GAS 서버로 POST 요청을 보냄
                const data = await fetchWithRetry(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                if (data.result === 'error' || !data.feedback) {
                    throw new Error(data.message || "AI 응답을 받아오지 못했습니다.");
                }
                
                aiFeedback = data.feedback;
                
            } catch (error) {
                aiError = "AI 분석을 가져오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
            } finally {
                isGeneratingAI = false;
                updateUI();
            }
        }

        function getInterpretation(score) {
            if (score >= 25) {
                return {
                    level: "높은 자아존중감",
                    desc: "자신을 긍정적으로 평가하고 있으며, 자신의 가치를 잘 인정하고 있습니다. 현재의 건강한 마음가짐을 잘 유지하세요.",
                    color: "text-blue-600",
                    bg: "bg-blue-50"
                };
            } else if (score >= 15) {
                return {
                    level: "보통의 자아존중감",
                    desc: "일반적이고 정상적인 수준의 자아존중감을 가지고 있습니다. 상황에 따라 자신감이 변동될 수 있으나 전반적으로 균형 잡힌 시각을 갖고 있습니다.",
                    color: "text-emerald-600",
                    bg: "bg-emerald-50"
                };
            } else {
                return {
                    level: "낮은 자아존중감",
